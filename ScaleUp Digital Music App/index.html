<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify App - Login</title>
    <style>
       
       
       /* Color Scheme Cyan/Black and Purple */
        
        :root {
            
                --primary-purple: #9b59b6;
                    --primary-purple-dark: #8e44ad;
                     --primary-purple-light: #af7ac5;
                        --accent-cyan: #00e5ff;
                             --accent-cyan-dark: #00b8d4;
                         --bg-dark: #0a0a0a;
                 --bg-surface: #121212;
                     --bg-elevated: #1e1e1e;
                         --text-white: #ffffff;
                             --text-secondary: #a0a0a0;
                     --border: #2a2a2a;
                     --error: #ff4444;
        }

        * {

            margin: 0;
                 padding: 0;
                    box-sizing: border-box;
        }

        body {

            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 100%);
                    color: var(--text-white);
                        min-height: 100vh;
                         display: flex;
                             justify-content: center;
                            align-items: center;
        }

       
        .login-container {

            width: 100%;
                 max-width: 440px;
                     padding: 20px;

        }

        .login-card {

                background: var(--bg-surface);
                    border-radius: 24px;
                         padding: 48px 40px;
                             border: 1px solid rgba(155, 89, 182, 0.3);
                            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 20px rgba(155, 89, 182, 0.1);
        }

        
        .logo {
             text-align: center;
                margin-bottom: 40px;
        }

        .logo h1 {

             background: linear-gradient(135deg, var(--primary-purple), var(--accent-cyan));
                 -webkit-background-clip: text;
                     background-clip: text;
                         color: transparent;
                            font-size: 2.5rem;
                                font-weight: 800;
                                 margin-bottom: 8px;
        }

        .logo p {

            color: var(--text-secondary);
                font-size: 0.875rem;
        }

        
        .input-group {

            margin-bottom: 24px;

        }

        .input-group label {

              display: block;
                margin-bottom: 8px;
                  font-size: 0.875rem;
                     font-weight: 500;
                         color: var(--text-secondary);
        }

        .input-group input {

                 width: 100%;
                     padding: 14px 16px;
                         background: var(--bg-elevated);
                             border: 1px solid var(--border);
                                 border-radius: 12px;
                                 color: var(--text-white);
                                     font-size: 1rem;
                                        transition: all 0.2s;
        }

        .input-group input:focus {

                outline: none;
                     border-color: var(--primary-purple);
                         box-shadow: 0 0 0 2px rgba(155, 89, 182, 0.2);
        }

       
        .btn-login {
            
            width: 100%;
                 padding: 14px 24px;
                     background: linear-gradient(135deg, var(--primary-purple), var(--accent-cyan-dark));
                        border: none;
                         border-radius: 40px;
                             color: white;
                                 font-weight: 700;
                                     font-size: 1rem;
                                          cursor: pointer;
                                                 transition: all 0.2s;
                                                     margin-top: 8px;
        }

        .btn-login:hover {

             transform: scale(1.02);
                box-shadow: 0 0 15px rgba(155, 89, 182, 0.4);
        }

        
        .signup-link {

                 text-align: center;
                    margin-top: 32px;
                         color: var(--text-secondary);
                             font-size: 0.875rem;
        }

        .signup-link a {

                 color: var(--accent-cyan);
                     text-decoration: none;
                         font-weight: 600;
                             cursor: pointer;
        }

        .signup-link a:hover {

            text-decoration: underline;
        }


        
        .error-message {
            
             background: rgba(255, 68, 68, 0.1);
                 border: 1px solid var(--error);
                     border-radius: 10px;
                        padding: 12px;
                             margin-bottom: 24px;
                              color: var(--error);
                                 font-size: 0.875rem;
                                     text-align: center;
                                             display: none;
        }

        
        .bob-demo  {
            
            text-align: center;
                 margin-top: 24px;
                    padding-top: 20px;
                         border-top: 1px solid var(--border);
                             font-size: 0.75rem;
                                color: var(--text-secondary);
        }

        .bob-demo  span {

             color: var(--accent-cyan);
                font-family: monospace;
        }

    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1>WIP Name</h1>
                <p>Your (Name of app) music experience</p>
            </div>

            <div id="errorMsg" class="error-message"></div>

           
            <form id="loginForm" onsubmit="return false;">
                <div class="input-group">
                    <label>Email or Username</label>
                    <input type="text" id="username" placeholder="bob@mail.com or bob" autocomplete="off">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password">
                </div>

                <button type="submit" class="btn-login" id="loginBtn">Log In</button>
            </form>

            <div class="signup-link">
                Don't have an account? <a id="showSignup">Sign Up</a>
            </div>

            <div class="demo-hint">
                🔐 Demo credentials: <span>bob@mail.com</span> / <span>bobpass</span>
            </div>
        </div>
    </div>

    
    <div id="signupModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000;">
        <div class="login-card" style="max-width: 440px; margin: 20px; position: relative;">
            <div style="position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 24px; color: var(--text-secondary);" id="closeSignup">&times;</div>
            <div class="logo">
                <h1>Create Account</h1>
                <p>Join Melodify today</p>
            </div>

            <div id="signupError" class="error-message"></div>

            <form id="signupForm" onsubmit="return false;">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="signupUsername" placeholder="Choose a username">
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="signupEmail" placeholder="your@email.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" placeholder="Create a password">
                </div>
                <div class="input-group">
                    <label>Account Type</label>
                    <select id="signupAccountType" style="width:100%; padding:14px 16px; background:#1e1e1e; border:1px solid #2a2a2a; border-radius:12px; color:white;">
                        <option value="Free">Free</option>
                        <option value="Premium">Premium</option>
                    </select>
                </div>
                <button type="submit" class="btn-login" id="signupBtn">Sign Up</button>
            </form>

            <div class="signup-link">
                Already have an account? <a id="showLoginFromSignup">Log In</a>
            </div>
        </div>
    </div>
